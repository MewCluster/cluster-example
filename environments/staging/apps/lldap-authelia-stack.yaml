apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-lldap-authelia-shared
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/lldap-authelia-shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: staging-config
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: lldap-authelia
  timeout: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-lldap-authelia-lldap
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/lldap-authelia-lldap
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: apps-lldap-authelia-shared
    - name: infra-postgresql-resources
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: lldap
      namespace: flux-system
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-lldap-authelia-authelia
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/lldap-authelia-authelia
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: apps-lldap-authelia-lldap
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: authelia
      namespace: flux-system
  timeout: 5m
