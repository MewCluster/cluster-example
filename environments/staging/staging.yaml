apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-config
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./environments/staging/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./environments/staging/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-infra
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./environments/staging/infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
