apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./config/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: v1
      kind: ConfigMap
      name: cluster-vars
      namespace: flux-system
  timeout: 2m
