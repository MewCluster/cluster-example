apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/cluster.yaml
  - ../base/lldap/
  - secret.lldap.yaml
# staging 仅部署 lldap，不需要 grafana
patches:
  - target:
      kind: Cluster
      name: pg-shared
    patch: |
      - op: add
        path: /spec/managed/roles/-
        value:
          name: ${PG_USER_LLDAP}
          ensure: present
          login: true
          passwordSecret:
            name: pg-lldap-credentials
