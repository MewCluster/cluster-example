# lldap 与 authelia 的共享密钥。
# 实际使用时请通过 SOPS 或外部 Secret 方案管理此文件。
#
# lldap 使用此 Secret 存储管理员凭据与 JWT 密钥。
# authelia 通过 LDAP bind 凭据连接 lldap，相关配置也存储于此。
#
# 注意：pg 凭据 Secret 创建在 postgresql 命名空间下，
# 需通过 reflector 同步到各应用命名空间，详见 infra/postgresql/resources。
apiVersion: v1
kind: Secret
metadata:
  name: lldap-credentials
  namespace: lldap-stack
stringData:
  LLDAP_JWT_SECRET: "changeme-jwt-secret"
  LLDAP_LDAP_USER_PASS: "changeme-admin-password"
